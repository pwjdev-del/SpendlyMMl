name: Spendly
options:
  bundleIdPrefix: com.spendly
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_ALLOWED: "NO"

packages:
  SpendlyCore:
    path: SpendlyCore

targets:
  Spendly:
    type: application
    platform: iOS
    sources:
      - path: Spendly
    settings:
      base:
        INFOPLIST_FILE: Spendly/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.spendly.ios
        PRODUCT_NAME: Spendly
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: SpendlyCore
    info:
      path: Spendly/Info.plist
      properties:
        CFBundleDisplayName: Spendly
        CFBundleName: Spendly
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - Inter-Bold.ttf
          - Manrope-Regular.ttf
          - Manrope-Medium.ttf
          - Manrope-SemiBold.ttf
          - Manrope-Bold.ttf
          - Manrope-ExtraBold.ttf
