name: Spendly
options:
  bundleIdPrefix: com.spendly
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGNING_ALLOWED: "YES"
    CODE_SIGN_STYLE: Automatic
    COPY_PHASE_STRIP: "NO"

packages:
  SpendlyCore:
    path: SpendlyCore

targets:
  Spendly:
    type: application
    platform: iOS
    sources:
      - path: Spendly
    settings:
      base:
        INFOPLIST_FILE: Spendly/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kathanpatel.spendly
        PRODUCT_NAME: Spendly
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: SpendlyCore
    info:
      path: Spendly/Info.plist
      properties:
        CFBundleDisplayName: Spendly
        CFBundleName: Spendly
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSFaceIDUsageDescription: "Spendly uses Face ID for quick, secure login"
        NSLocationWhenInUseUsageDescription: "Spendly uses your location to show your position on the job map and provide driving directions."
        NSMicrophoneUsageDescription: "Spendly needs microphone access to record voice notes during job execution"
        UIAppFonts:
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - Inter-Bold.ttf
          - Manrope-Regular.ttf
          - Manrope-Medium.ttf
          - Manrope-SemiBold.ttf
          - Manrope-Bold.ttf
          - Manrope-ExtraBold.ttf

  SpendlyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SpendlyUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Spendly
